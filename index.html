<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4A90E2">
    <meta name="description" content="Application éducative pour réviser le calcul et le français du CP au CM2.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self' file: data: blob:;
                   script-src 'self' 'unsafe-inline' file: data: blob:;
                   style-src 'self' 'unsafe-inline' file: https://fonts.googleapis.com;
                   font-src 'self' file: data: https://fonts.gstatic.com;
                   img-src 'self' file: data: blob:;">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    
    <title>Devoir Numérique</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div id="app">
    <header>
        <button id="btn-back" type="button" class="btn btn--header btn-header">←</button>
        <strong id="app-title">DEVOIR NUMÉRIQUE</strong>
        <button id="btn-home" type="button" class="btn btn--header btn-header">🏠</button>
    </header>

    <section id="screen-profiles" class="screen active">
        <h1>Qui va jouer ?</h1>
        <div id="profiles-list" class="grid-menu"></div>
        <div class="card new-profile-card">
            <input type="text" id="new-profile-name" placeholder="Prénom" autocomplete="off" maxlength="15">
            <button id="btn-add-profile" type="button" class="btn btn--icon btn--success btn-add-profile">+</button> 
        </div>
    </section>

    <section id="screen-grades" class="screen"><h2>Ta classe ?</h2><div id="grades-list" class="grid-menu"></div></section>
    <section id="screen-themes" class="screen"><h2>Choisis un thème</h2><div id="themes-list" class="grid-menu"></div></section>
    <section id="screen-levels" class="screen"><h2>Choisis un sous-thème</h2><div id="levels-list" class="grid-menu"></div></section>
    <section id="screen-exercises" class="screen"><h2>Choisis un exercice</h2><div id="exercises-list" class="grid-menu"></div></section>

    <section id="screen-game" class="screen">
        <div class="progress-container"><div id="game-progress" class="progress-bar"></div></div>
        
        <div class="game-zone">
            <div id="game-instruction" class="game-instruction" aria-live="polite"></div>
            <div id="math-problem" class="math-problem"></div>
            <div id="user-answer" class="answer-display"></div>
        </div>

        <div class="keyboard-container">
            <div id="keyboard-num" class="keyboard-layout"></div>
            </div>
    </section>

    <section id="screen-results" class="screen screen-results">
        <h1 id="result-title" class="result-title">Terminé !</h1>
        <div id="stars-container" class="results-stars"></div>
        <p id="result-score" class="result-score"></p>
        <button id="btn-results-menu" class="btn card card--action card--action-primary">
            <span class="card-title card-title-on-dark">RETOUR AUX THÈMES</span>
        </button>
    </section>
</div>

<script src="js/storage.js"></script>
<script src="js/engines-core.js"></script>
<script src="js/engines-documentary.js"></script>
<script src="js/engines-math.js"></script>
<script src="js/engines-french.js"></script>
<script src="js/engines.js"></script>
<script src="js/ui-keyboards.js"></script>
<script src="js/ui-documentary.js"></script>
<script src="js/ui-visuals.js"></script>
<script src="js/ui.js"></script>
<script src="js/data-bundle.js"></script>
<script src="js/validators.js"></script>
<script src="js/app.js"></script>

<script>
    if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('✅ SW inscrit', reg.scope))
                .catch(err => console.log('❌ SW échec', err));
        });
    }
</script>

</body>

</html>
